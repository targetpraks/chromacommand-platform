apiVersion: batch/v1
kind: Job
metadata:
  name: db-seed
  namespace: chromacommand
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: chromacommand-api:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres:5432/chromacommand"
          command:
            - sh
            - -c
            - "cd /app/packages/database && npx tsx seed.ts"
