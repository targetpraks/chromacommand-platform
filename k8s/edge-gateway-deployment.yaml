apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-gateway
  namespace: chromacommand
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-gateway
  template:
    metadata:
      labels:
        app: edge-gateway
    spec:
      containers:
        - name: edge-gateway
          image: chromacommand-edge-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: STORE_ID
              value: "pp-a01"
            - name: REGION_ID
              value: "cape-town"
            - name: MQTT_BROKER_URL
              value: "mqtt://mqtt:1883"
            - name: DB_PATH
              value: "/data/edge_cache.db"
            - name: HEARTBEAT_INTERVAL
              value: "30000"
          volumeMounts:
            - name: edge-data
              mountPath: /data
      volumes:
        - name: edge-data
          persistentVolumeClaim:
            claimName: edge-data
---
apiVersion: v1
kind: Service
metadata:
  name: edge-gateway
  namespace: chromacommand
spec:
  selector:
    app: edge-gateway
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edge-data
  namespace: chromacommand
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
