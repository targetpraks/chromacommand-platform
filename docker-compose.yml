version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chromacommand
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:***@postgres:5432/chromacommand
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages:/app/packages
    command: sh -c "cd /app/packages/database && npx tsx seed.ts"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:***@postgres:5432/chromacommand
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_TTL: ${JWT_TTL:-1h}
      REFRESH_TTL_DAYS: ${REFRESH_TTL_DAYS:-30}
      MQTT_BROKER_URL: mqtt://mqtt:1883
      DASHBOARD_ORIGIN: http://localhost:3000
      NODE_ENV: development
    depends_on:
      - seed
      - mqtt
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    command: npm run dev --workspace=@chromacommand/api

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    depends_on:
      - api
    volumes:
      - ./apps/dashboard:/app/apps/dashboard
      - ./packages:/app/packages
    command: npm run dev --workspace=@chromacommand/dashboard

  # Per-store edge gateway for local end-to-end testing.
  # Comment out when iterating on cloud services only.
  edge-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.edge-gateway
    network_mode: host
    environment:
      STORE_ID: pp-a01
      REGION_ID: cape-town
      MQTT_BROKER_URL: mqtt://localhost:1883
      DB_PATH: /data/edge_cache.db
      HEARTBEAT_INTERVAL: 30000
    volumes:
      - edge_data:/data
    depends_on:
      - mqtt

volumes:
  edge_data:
  postgres_data:
  redis_data:
  mqtt_data:
